<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600" fill="none">
  <defs>
    <style>
      .ink { fill: #111111; font-family: "Noto Sans KR", "Space Grotesk", sans-serif; }
      .muted { fill: #666666; font-family: "Noto Sans KR", sans-serif; }
      .kicker { font-size: 16px; font-weight: 700; letter-spacing: 0.16em; }
      .title { font-size: 64px; font-weight: 800; letter-spacing: -0.06em; }
      .sub { font-size: 22px; line-height: 1.7; }
      .section { font-size: 28px; font-weight: 800; letter-spacing: -0.04em; }
      .body { font-size: 18px; line-height: 1.72; }
      .tag { font-size: 14px; font-weight: 700; letter-spacing: 0.08em; }
      .mini { font-size: 14px; }
      .btn { font-size: 15px; font-weight: 700; }
    </style>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2380f1"/>
      <stop offset="25%" stop-color="#32b154"/>
      <stop offset="50%" stop-color="#1b3479"/>
      <stop offset="75%" stop-color="#efbb45"/>
      <stop offset="100%" stop-color="#e7437b"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.05"/>
    </filter>
  </defs>

  <rect width="1600" height="1600" fill="#fcfcfa"/>

  <rect x="0" y="0" width="1600" height="70" fill="#ffffff"/>
  <rect x="0" y="69" width="1600" height="1" fill="#ececec"/>
  <g transform="translate(76 28)">
    <circle cx="0" cy="8" r="8" fill="#111111"/>
    <circle cx="10" cy="8" r="8" fill="#2380f1"/>
    <text class="ink" x="34" y="14" style="font-size:24px;font-weight:800;letter-spacing:-0.04em;">KCGsoft</text>
  </g>
  <g transform="translate(1000 29)">
    <text class="ink mini" x="0" y="14" style="font-weight:700;">Core Services</text>
    <text class="muted mini" x="118" y="14" style="font-weight:700;">Capability</text>
    <text class="muted mini" x="210" y="14" style="font-weight:700;">Company</text>
    <text class="muted mini" x="294" y="14" style="font-weight:700;">Contact</text>
  </g>

  <g transform="translate(120 150)">
    <text class="ink kicker" x="0" y="0">CAPABILITY / WHY KCGsoft</text>
    <text class="ink title" x="0" y="82">버스회사 운영의 고민을</text>
    <text class="ink title" x="0" y="156">하나의 시스템으로 묶습니다</text>
    <text class="muted sub" x="0" y="224">
      <tspan x="0" dy="0">차량관제서비스와 회사 내부 ERP 연동, 차량 연료 충전 데이터,</tspan>
      <tspan x="0" dy="36">데이터 기반 노선설계를 따로 보지 않고 같은 운영 흐름으로 정리합니다.</tspan>
    </text>
    <rect x="0" y="290" width="120" height="4" fill="url(#bar)"/>
  </g>

  <g transform="translate(120 520)">
    <text class="ink section" x="0" y="0">한 번에 연결되는 영역</text>
    <text class="muted" x="0" y="34" style="font-size:17px;">섹션은 카드로 쪼개지지 않고, 여백과 선으로만 구분합니다.</text>
  </g>

  <g transform="translate(120 596)">
    <rect x="0" y="0" width="1360" height="1" fill="#ececec"/>

    <g transform="translate(0 34)">
      <text class="ink tag" x="0" y="0" fill="#2380f1">01</text>
      <text class="ink" x="0" y="48" style="font-size:26px;font-weight:800;letter-spacing:-0.04em;">차량관제서비스</text>
      <text class="muted body" x="0" y="88">
        <tspan x="0" dy="0">실시간 위치와 운행 상태, 탑승 정보를 하나로 보면서</tspan>
        <tspan x="0" dy="30">운영과 현장을 같은 화면에서 읽을 수 있게 합니다.</tspan>
      </text>
      <g transform="translate(0 136)">
        <rect x="0" y="0" width="134" height="34" fill="#ffffff" stroke="#111111" stroke-width="1"/>
        <text class="ink btn" x="18" y="23">Wonder Shuttle</text>
        <rect x="144" y="0" width="102" height="34" fill="#ffffff" stroke="#2380f1" stroke-width="1"/>
        <text class="ink btn" x="162" y="23" fill="#2380f1">관제</text>
      </g>
      <g transform="translate(860 -6)">
        <rect x="0" y="0" width="460" height="190" fill="#ffffff" stroke="#e9e9e9"/>
        <rect x="28" y="28" width="404" height="18" fill="#eaf4ff"/>
        <rect x="28" y="60" width="310" height="10" fill="#eef3f7"/>
        <rect x="28" y="82" width="366" height="10" fill="#eef3f7"/>
        <rect x="28" y="120" width="404" height="34" fill="#fbfbf9" stroke="#eaeaea"/>
        <circle cx="58" cy="137" r="6" fill="#32b154"/>
        <circle cx="108" cy="137" r="6" fill="#2380f1"/>
        <circle cx="158" cy="137" r="6" fill="#1b3479"/>
      </g>
    </g>

    <rect x="0" y="238" width="1360" height="1" fill="#ececec"/>

    <g transform="translate(0 272)">
      <text class="ink tag" x="0" y="0" fill="#32b154">02</text>
      <text class="ink" x="0" y="48" style="font-size:26px;font-weight:800;letter-spacing:-0.04em;">회사 내부 ERP 연동</text>
      <text class="muted body" x="0" y="88">
        <tspan x="0" dy="0">배차, 정산, 이력, 메모가 흩어지지 않도록</tspan>
        <tspan x="0" dy="30">내부 ERP와 직접 이어서 반복 업무를 줄입니다.</tspan>
      </text>
      <g transform="translate(0 136)">
        <rect x="0" y="0" width="134" height="34" fill="#ffffff" stroke="#111111" stroke-width="1"/>
        <text class="ink btn" x="18" y="23">Wonder FMS</text>
        <rect x="144" y="0" width="120" height="34" fill="#ffffff" stroke="#32b154" stroke-width="1"/>
        <text class="ink btn" x="162" y="23" fill="#32b154">ERP 연동</text>
      </g>
      <g transform="translate(860 -6)">
        <rect x="0" y="0" width="460" height="190" fill="#ffffff" stroke="#e9e9e9"/>
        <rect x="28" y="28" width="404" height="18" fill="#edf8ef"/>
        <rect x="28" y="60" width="210" height="10" fill="#eef3f7"/>
        <rect x="28" y="82" width="330" height="10" fill="#eef3f7"/>
        <rect x="28" y="116" width="404" height="44" fill="#fbfbf9" stroke="#eaeaea"/>
        <rect x="46" y="128" width="90" height="20" fill="#edf8ef"/>
        <rect x="148" y="128" width="90" height="20" fill="#edf8ef"/>
        <rect x="250" y="128" width="90" height="20" fill="#edf8ef"/>
      </g>
    </g>

    <rect x="0" y="510" width="1360" height="1" fill="#ececec"/>

    <g transform="translate(0 544)">
      <text class="ink tag" x="0" y="0" fill="#1b3479">03</text>
      <text class="ink" x="0" y="48" style="font-size:26px;font-weight:800;letter-spacing:-0.04em;">차량 연료 충전 데이터</text>
      <text class="muted body" x="0" y="88">
        <tspan x="0" dy="0">충전 현황과 운영 기록을 연결해</tspan>
        <tspan x="0" dy="30">현장 데이터가 관리 기준으로 바로 이어지게 합니다.</tspan>
      </text>
      <g transform="translate(0 136)">
        <rect x="0" y="0" width="134" height="34" fill="#ffffff" stroke="#111111" stroke-width="1"/>
        <text class="ink btn" x="18" y="23">Wonder Hydro</text>
        <rect x="144" y="0" width="120" height="34" fill="#ffffff" stroke="#1b3479" stroke-width="1"/>
        <text class="ink btn" x="162" y="23" fill="#1b3479">충전 데이터</text>
      </g>
      <g transform="translate(860 -6)">
        <rect x="0" y="0" width="460" height="190" fill="#ffffff" stroke="#e9e9e9"/>
        <circle cx="82" cy="54" r="22" fill="#1b3479" opacity="0.13"/>
        <circle cx="146" cy="76" r="22" fill="#efbb45" opacity="0.16"/>
        <circle cx="212" cy="50" r="22" fill="#32b154" opacity="0.14"/>
        <rect x="30" y="124" width="400" height="10" fill="#eef3f7"/>
        <rect x="30" y="146" width="260" height="10" fill="#eef3f7"/>
      </g>
    </g>

    <rect x="0" y="782" width="1360" height="1" fill="#ececec"/>

    <g transform="translate(0 816)">
      <text class="ink tag" x="0" y="0" fill="#efbb45">04</text>
      <text class="ink" x="0" y="48" style="font-size:26px;font-weight:800;letter-spacing:-0.04em;">데이터 기반 노선설계</text>
      <text class="muted body" x="0" y="88">
        <tspan x="0" dy="0">노선 증감차, 정류장 판단, 운영 효율화까지</tspan>
        <tspan x="0" dy="30">데이터로 설계하는 방식으로 정리합니다.</tspan>
      </text>
      <g transform="translate(0 136)">
        <rect x="0" y="0" width="134" height="34" fill="#ffffff" stroke="#111111" stroke-width="1"/>
        <text class="ink btn" x="18" y="23">Wonder Linx</text>
        <rect x="144" y="0" width="120" height="34" fill="#ffffff" stroke="#efbb45" stroke-width="1"/>
        <text class="ink btn" x="162" y="23" fill="#a57c06">노선 설계</text>
      </g>
      <g transform="translate(860 -6)">
        <rect x="0" y="0" width="460" height="190" fill="#ffffff" stroke="#e9e9e9"/>
        <path d="M32 126H428" stroke="#dfe4ea" stroke-width="2"/>
        <circle cx="90" cy="126" r="9" fill="#2380f1"/>
        <circle cx="188" cy="126" r="9" fill="#32b154"/>
        <circle cx="288" cy="126" r="9" fill="#1b3479"/>
        <circle cx="388" cy="126" r="9" fill="#efbb45"/>
        <rect x="40" y="40" width="110" height="20" fill="#eef3f7"/>
        <rect x="40" y="66" width="170" height="10" fill="#eef3f7"/>
        <rect x="40" y="88" width="132" height="10" fill="#eef3f7"/>
      </g>
    </g>
  </g>

  <g transform="translate(120 1540)">
    <rect x="0" y="0" width="1360" height="1" fill="#ececec"/>
    <text class="muted mini" x="0" y="32">섹션은 열려 있고, 정보는 넓게 퍼지되 너무 비어 보이지 않도록 조정한 예시 시안</text>
  </g>
</svg>
