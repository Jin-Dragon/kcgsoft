<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1040" role="img" aria-label="KCGsoft 새로운 UI 구성 컨셉">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f9fc"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9edf3"/>
      <stop offset="100%" stop-color="#dce3ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
    <style>
      .nav { font: 500 14px "Space Grotesk", sans-serif; fill: #111111; }
      .eyebrow { font: 700 11px "Space Grotesk", sans-serif; letter-spacing: .14em; fill: #7a8088; }
      .title { font: 700 44px "Space Grotesk", "Noto Sans KR", sans-serif; fill: #111111; }
      .body { font: 400 16px "Noto Sans KR", sans-serif; fill: #3e202a; }
      .label { font: 700 12px "Space Grotesk", sans-serif; letter-spacing: .12em; }
      .cardTitle { font: 700 22px "Noto Sans KR", sans-serif; fill: #111111; }
      .cardText { font: 400 14px "Noto Sans KR", sans-serif; fill: #3e202a; }
      .btn { font: 700 13px "Noto Sans KR", sans-serif; fill: #111111; }
      .flowNum { font: 700 12px "Space Grotesk", sans-serif; letter-spacing: .12em; }
      .flowName { font: 700 15px "Space Grotesk", sans-serif; fill: #111111; }
      .mini { font: 400 12px "Noto Sans KR", sans-serif; fill: #5d6370; }
    </style>
  </defs>

  <rect width="1600" height="1040" fill="url(#bg)"/>

  <!-- Top chrome -->
  <rect x="48" y="28" width="1504" height="74" rx="0" fill="#ffffff" stroke="#e6ebf2"/>
  <text x="80" y="74" class="nav">KCG soft</text>
  <text x="214" y="74" class="nav" fill="#3e202a">mobility technology partner</text>
  <text x="1152" y="74" class="nav">Core Services</text>
  <text x="1288" y="74" class="nav">Capability</text>
  <text x="1404" y="74" class="nav">Company</text>
  <text x="1496" y="74" class="nav">Contact</text>

  <!-- Left identity rail -->
  <rect x="48" y="124" width="240" height="868" fill="#ffffff" stroke="#e6ebf2"/>
  <rect x="48" y="124" width="6" height="868" fill="#111111"/>
  <text x="84" y="176" class="eyebrow">INDEX / CORE SERVICES</text>
  <text x="84" y="228" class="title" style="font-size:34px;">KCGsoft</text>
  <text x="84" y="260" class="body">운영과 데이터가 흐르는</text>
  <text x="84" y="282" class="body">서비스 구조를 한 화면에</text>
  <text x="84" y="304" class="body">정리하는 새로운 편집형 UI.</text>
  <line x1="84" y1="344" x2="220" y2="344" stroke="#d9dfe7"/>
  <text x="84" y="378" class="mini">01  /  Flow first</text>
  <text x="84" y="404" class="mini">02  /  Product cards</text>
  <text x="84" y="430" class="mini">03  /  Detail panel</text>
  <text x="84" y="456" class="mini">04  /  Clients</text>

  <!-- Main composition -->
  <rect x="308" y="124" width="828" height="868" fill="#ffffff" stroke="#e6ebf2"/>
  <rect x="308" y="124" width="828" height="176" fill="#ffffff"/>
  <path d="M308 236 C430 176 560 172 690 214 C824 258 950 258 1136 196" fill="none" stroke="#e7eef5" stroke-width="2"/>
  <path d="M308 262 C450 210 588 210 742 242 C872 268 996 260 1136 224" fill="none" stroke="#edf2f7" stroke-width="2"/>

  <text x="348" y="186" class="eyebrow">PRODUCT ATLAS</text>
  <text x="348" y="240" class="title">운영 흐름을 지도처럼 읽는 UI</text>
  <text x="348" y="272" class="body">상단 요약, 중간 흐름도, 하단 제품 패널이 각각 독립적으로 보이면서도 서로 연결되는 구성입니다.</text>

  <!-- Central flow line -->
  <line x1="418" y1="320" x2="418" y2="860" stroke="url(#track)" stroke-width="4"/>
  <circle cx="418" cy="350" r="13" fill="#2380f1"/>
  <circle cx="418" cy="454" r="13" fill="#32b154"/>
  <circle cx="418" cy="558" r="13" fill="#1b3479"/>
  <circle cx="418" cy="662" r="13" fill="#efbb45"/>
  <circle cx="418" cy="766" r="13" fill="#e7437b"/>

  <g transform="translate(448 332)">
    <text class="flowNum" x="0" y="16" fill="#2380f1">01</text>
    <text class="flowName" x="38" y="17">Wonder Linx</text>
    <text class="mini" x="38" y="40">지능형 노선 설계</text>
  </g>
  <g transform="translate(448 436)">
    <text class="flowNum" x="0" y="16" fill="#32b154">02</text>
    <text class="flowName" x="38" y="17">Wonder Shuttle</text>
    <text class="mini" x="38" y="40">GPS / 탑승자 데이터</text>
  </g>
  <g transform="translate(448 540)">
    <text class="flowNum" x="0" y="16" fill="#1b3479">03</text>
    <text class="flowName" x="38" y="17">Data Efficiency</text>
    <text class="mini" x="38" y="40">노선 증감차 효율화</text>
  </g>
  <g transform="translate(448 644)">
    <text class="flowNum" x="0" y="16" fill="#efbb45">04</text>
    <text class="flowName" x="38" y="17">Wonder FMS</text>
    <text class="mini" x="38" y="40">관리 ERP 데이터화</text>
  </g>
  <g transform="translate(448 748)">
    <text class="flowNum" x="0" y="16" fill="#e7437b">05</text>
    <text class="flowName" x="38" y="17">Result</text>
    <text class="mini" x="38" y="40">운영 효율 완성</text>
  </g>

  <!-- Right showcase panel -->
  <g filter="url(#shadow)">
    <rect x="860" y="340" width="236" height="440" rx="18" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="878" y="360" width="200" height="18" rx="9" fill="#32b154"/>
    <text x="878" y="416" class="label" fill="#32b154">WONDER SHUTTLE</text>
    <text x="878" y="460" class="cardTitle">버스 통합 관제</text>
    <text x="878" y="490" class="cardText">실시간 위치, 노선,</text>
    <text x="878" y="512" class="cardText">탑승 데이터를 하나의</text>
    <text x="878" y="534" class="cardText">관리 화면으로 연결.</text>
    <rect x="878" y="568" width="164" height="112" rx="12" fill="#f4fbf6" stroke="#d0ebd8"/>
    <rect x="900" y="604" width="120" height="22" rx="11" fill="#32b154"/>
    <circle cx="918" cy="690" r="10" fill="#111111"/>
    <circle cx="1000" cy="690" r="10" fill="#111111"/>
    <rect x="878" y="714" width="98" height="34" rx="0" fill="#ffffff" stroke="#111111"/>
    <text x="892" y="736" class="btn">자세히 보기</text>
  </g>

  <!-- Bottom product matrix -->
  <g filter="url(#shadow)">
    <rect x="308" y="844" width="252" height="118" rx="16" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="580" y="844" width="252" height="118" rx="16" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="852" y="844" width="252" height="118" rx="16" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="1124" y="844" width="252" height="118" rx="16" fill="#ffffff" stroke="#dfe4ec"/>
  </g>
  <text x="332" y="876" class="label" fill="#2380f1">LINX</text>
  <text x="332" y="906" class="cardText">노선 설계의 시작점</text>
  <text x="604" y="876" class="label" fill="#32b154">SHUTTLE</text>
  <text x="604" y="906" class="cardText">차량과 탑승 데이터를 묶음</text>
  <text x="876" y="876" class="label" fill="#1b3479">HYDRO</text>
  <text x="876" y="906" class="cardText">현장 운영 상태 추적</text>
  <text x="1148" y="876" class="label" fill="#efbb45">FMS</text>
  <text x="1148" y="906" class="cardText">ERP / 배차 / 정산 연결</text>

  <!-- Accent marks -->
  <rect x="1200" y="156" width="152" height="6" fill="#32b154"/>
  <rect x="1368" y="156" width="152" height="6" fill="#2380f1"/>
  <rect x="1536" y="156" width="16" height="6" fill="#e7437b"/>
</svg>
