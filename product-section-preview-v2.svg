<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1040" role="img" aria-label="KCGsoft 제품 소개 섹션 예시">
  <defs>
    <linearGradient id="pageGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbfcfe"/>
    </linearGradient>
    <linearGradient id="heroSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eaf6ee"/>
      <stop offset="45%" stop-color="#edf3ff"/>
      <stop offset="100%" stop-color="#fceef4"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <style>
      .kicker { font: 700 12px "Space Grotesk", sans-serif; letter-spacing: .14em; fill: #7c8087; }
      .title { font: 700 42px "Space Grotesk", "Noto Sans KR", sans-serif; fill: #111111; }
      .summary { font: 400 18px "Noto Sans KR", sans-serif; fill: #3e202a; }
      .nav { font: 500 17px "Space Grotesk", sans-serif; fill: #111111; }
      .sectionTag { font: 700 12px "Space Grotesk", sans-serif; letter-spacing: .12em; }
      .cardName { font: 700 16px "Space Grotesk", sans-serif; letter-spacing: .08em; }
      .cardTitle { font: 700 28px "Noto Sans KR", sans-serif; fill: #111111; }
      .cardText { font: 400 15px "Noto Sans KR", sans-serif; fill: #3e202a; }
      .btnText { font: 700 14px "Noto Sans KR", sans-serif; fill: #111111; }
      .flowNum { font: 700 12px "Space Grotesk", sans-serif; letter-spacing: .12em; }
      .flowTitle { font: 700 14px "Space Grotesk", sans-serif; fill: #111111; }
      .flowText { font: 400 12px "Noto Sans KR", sans-serif; fill: #5a6170; }
    </style>
  </defs>

  <rect width="1600" height="1040" fill="url(#pageGlow)"/>
  <path d="M0 96 C220 28 392 24 580 78 C742 124 894 126 1060 74 C1220 24 1396 20 1600 68 L1600 0 L0 0 Z" fill="url(#heroSweep)" opacity=".8"/>
  <path d="M0 1004 C220 948 416 944 606 980 C802 1018 994 1012 1176 972 C1332 938 1454 934 1600 960 L1600 1040 L0 1040 Z" fill="#f6f7fb"/>

  <!-- Header -->
  <text x="80" y="78" class="nav">KCG soft</text>
  <text x="220" y="78" class="nav" opacity=".82">mobility technology partner</text>
  <text x="1080" y="78" class="nav" opacity=".88">Core Services</text>
  <text x="1220" y="78" class="nav" opacity=".88">Capability</text>
  <text x="1354" y="78" class="nav" opacity=".88">Company</text>
  <text x="1468" y="78" class="nav" opacity=".88">Contact</text>

  <!-- Section head -->
  <text x="80" y="154" class="kicker">INDEX / CORE SERVICES</text>
  <text x="80" y="206" class="title">KCGsoft 핵심 서비스 라인업</text>
  <text x="80" y="240" class="summary">운영 흐름과 현장 데이터를 하나의 체계로 묶어 읽히게 하는 제품 소개 섹션입니다.</text>

  <!-- Flow strip -->
  <g transform="translate(80 286)">
    <rect x="0" y="0" width="1440" height="58" fill="#ffffff" stroke="#dfe4ec"/>
    <g transform="translate(22 16)">
      <text class="flowNum" x="0" y="12" fill="#2380f1">01</text>
      <text class="flowTitle" x="34" y="12">Wonder Linx</text>
      <line x1="160" y1="9" x2="212" y2="9" stroke="#b7bcc4" stroke-width="1"/>
      <text class="flowNum" x="228" y="12" fill="#32b154">02</text>
      <text class="flowTitle" x="262" y="12">Wonder Shuttle</text>
      <line x1="420" y1="9" x2="472" y2="9" stroke="#b7bcc4" stroke-width="1"/>
      <text class="flowNum" x="488" y="12" fill="#1b3479">03</text>
      <text class="flowTitle" x="522" y="12">Data Efficiency</text>
      <line x1="662" y1="9" x2="714" y2="9" stroke="#b7bcc4" stroke-width="1"/>
      <text class="flowNum" x="730" y="12" fill="#efbb45">04</text>
      <text class="flowTitle" x="764" y="12">Wonder FMS</text>
      <line x1="886" y1="9" x2="938" y2="9" stroke="#b7bcc4" stroke-width="1"/>
      <text class="flowNum" x="954" y="12" fill="#e7437b">05</text>
      <text class="flowTitle" x="988" y="12">Result</text>
    </g>
  </g>

  <!-- Card row 1 -->
  <g filter="url(#cardShadow)">
    <rect x="80" y="380" width="432" height="286" rx="16" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="584" y="380" width="432" height="286" rx="16" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="1088" y="380" width="432" height="286" rx="16" fill="#ffffff" stroke="#dfe4ec"/>
  </g>

  <text x="108" y="414" class="sectionTag" fill="#32b154">WONDER SHUTTLE</text>
  <text x="108" y="458" class="cardTitle">버스 통합 관제 서비스</text>
  <text x="108" y="486" class="cardText">실시간 위치 확인과 노선 운영을</text>
  <text x="108" y="508" class="cardText">하나의 화면에서 읽히게 정리합니다.</text>
  <rect x="108" y="532" width="156" height="74" rx="10" fill="#eef9f1" stroke="#c9e6d4"/>
  <rect x="124" y="554" width="124" height="14" rx="7" fill="#32b154"/>
  <rect x="144" y="548" width="34" height="26" rx="5" fill="#ffffff" stroke="#32b154" stroke-width="2"/>
  <circle cx="136" cy="608" r="9" fill="#111111"/>
  <circle cx="252" cy="608" r="9" fill="#111111"/>
  <rect x="108" y="622" width="108" height="36" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="124" y="645" class="btnText">자세히 보기</text>

  <text x="612" y="414" class="sectionTag" fill="#2380f1">WONDER LINX</text>
  <text x="612" y="458" class="cardTitle">지능형 버스 노선 설계</text>
  <text x="612" y="486" class="cardText">노선 분석과 최적 경로 계산을</text>
  <text x="612" y="508" class="cardText">업무 흐름 안에서 바로 읽히게 둡니다.</text>
  <rect x="766" y="532" width="174" height="76" rx="10" fill="#eef4ff" stroke="#c9d9ff"/>
  <path d="M610 598 C660 578, 702 578, 758 562" fill="none" stroke="#2380f1" stroke-width="3"/>
  <circle cx="620" cy="594" r="5" fill="#2380f1"/>
  <circle cx="682" cy="584" r="5" fill="#2380f1"/>
  <circle cx="744" cy="572" r="5" fill="#2380f1"/>
  <rect x="812" y="518" width="64" height="104" rx="12" fill="#ffffff" stroke="#2380f1" stroke-width="2"/>
  <circle cx="804" cy="608" r="8" fill="#111111"/>
  <circle cx="902" cy="608" r="8" fill="#111111"/>
  <rect x="612" y="622" width="108" height="36" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="628" y="645" class="btnText">자세히 보기</text>

  <text x="1116" y="414" class="sectionTag" fill="#1b3479">WONDER HYDRO</text>
  <text x="1116" y="458" class="cardTitle">수소 충전 통합 관리</text>
  <text x="1116" y="486" class="cardText">충전 상태와 이력을 한 화면에서</text>
  <text x="1116" y="508" class="cardText">작업 단위로 묶어 보여줍니다.</text>
  <rect x="1126" y="530" width="164" height="80" rx="10" fill="#eef2ff" stroke="#c9d5ff"/>
  <rect x="1150" y="522" width="34" height="90" rx="8" fill="#ffffff" stroke="#1b3479" stroke-width="2"/>
  <rect x="1196" y="506" width="62" height="106" rx="10" fill="#ffffff" stroke="#1b3479" stroke-width="2"/>
  <rect x="1268" y="524" width="36" height="88" rx="8" fill="#ffffff" stroke="#1b3479" stroke-width="2"/>
  <circle cx="1158" cy="610" r="8" fill="#111111"/>
  <circle cx="1288" cy="610" r="8" fill="#111111"/>
  <rect x="1116" y="622" width="108" height="36" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="1132" y="645" class="btnText">자세히 보기</text>

  <!-- Card row 2 -->
  <g filter="url(#cardShadow)">
    <rect x="80" y="720" width="648" height="214" rx="16" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="752" y="720" width="768" height="214" rx="16" fill="#ffffff" stroke="#dfe4ec"/>
  </g>

  <text x="108" y="756" class="sectionTag" fill="#efbb45">WONDER FMS</text>
  <text x="108" y="802" class="cardTitle">전세버스 ERP 통합 관리</text>
  <text x="108" y="830" class="cardText">운영, 배차, 정산을 연결해</text>
  <text x="108" y="852" class="cardText">전세버스 업무 흐름을 한 번에 정리합니다.</text>
  <g transform="translate(402 782)">
    <rect x="0" y="18" width="140" height="56" rx="8" fill="#fff8de" stroke="#efbb45"/>
    <rect x="10" y="0" width="54" height="40" rx="8" fill="#ffffff" stroke="#efbb45" stroke-width="2"/>
    <rect x="76" y="0" width="54" height="40" rx="8" fill="#ffffff" stroke="#efbb45" stroke-width="2"/>
    <rect x="54" y="-8" width="48" height="78" rx="8" fill="#ffffff" stroke="#efbb45" stroke-width="2"/>
    <text x="78" y="40" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700" fill="#efbb45">ERP</text>
    <circle cx="18" cy="82" r="8" fill="#111111"/>
    <circle cx="122" cy="82" r="8" fill="#111111"/>
  </g>
  <rect x="108" y="868" width="108" height="36" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="124" y="891" class="btnText">자세히 보기</text>

  <text x="780" y="756" class="sectionTag" fill="#e7437b">CATCHLOC</text>
  <text x="780" y="802" class="cardTitle">GPS 위치 추적 솔루션</text>
  <text x="780" y="830" class="cardText">차량과 자산의 위치를 실시간으로 확인하고</text>
  <text x="780" y="852" class="cardText">이동 이력과 상태를 관리하는 구조입니다.</text>
  <g transform="translate(1160 786)">
    <rect x="0" y="8" width="244" height="86" rx="14" fill="#ffeef5" stroke="#f2c2d2"/>
    <rect x="18" y="30" width="66" height="34" rx="8" fill="#ffffff" stroke="#e7437b" stroke-width="2"/>
    <rect x="96" y="18" width="54" height="46" rx="8" fill="#ffffff" stroke="#e7437b" stroke-width="2"/>
    <rect x="160" y="28" width="56" height="36" rx="8" fill="#ffffff" stroke="#e7437b" stroke-width="2"/>
    <circle cx="44" cy="88" r="8" fill="#111111"/>
    <circle cx="188" cy="88" r="8" fill="#111111"/>
    <path d="M136 24c10 0 18 8 18 18 0 16-18 34-18 34s-18-18-18-34c0-10 8-18 18-18z" fill="#e7437b"/>
    <circle cx="136" cy="42" r="5" fill="#ffffff"/>
  </g>
  <rect x="780" y="868" width="108" height="36" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="796" y="891" class="btnText">자세히 보기</text>
</svg>
