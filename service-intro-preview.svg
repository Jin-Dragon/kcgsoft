<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1060" role="img" aria-label="KCGsoft 서비스 소개 섹션 예시">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbfcfe"/>
    </linearGradient>
    <linearGradient id="accentWave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e9f7ed" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#eef3ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fdeff4" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <style>
      .nav { font: 500 14px "Space Grotesk", sans-serif; fill: #111111; }
      .eyebrow { font: 700 11px "Space Grotesk", sans-serif; letter-spacing: .14em; fill: #7a8088; }
      .title { font: 700 44px "Space Grotesk", "Noto Sans KR", sans-serif; fill: #111111; }
      .body { font: 400 16px "Noto Sans KR", sans-serif; fill: #3e202a; }
      .cardTag { font: 700 12px "Space Grotesk", sans-serif; letter-spacing: .12em; }
      .cardTitle { font: 700 26px "Noto Sans KR", sans-serif; fill: #111111; }
      .cardText { font: 400 14px "Noto Sans KR", sans-serif; fill: #3e202a; }
      .btn { font: 700 13px "Noto Sans KR", sans-serif; fill: #111111; }
    </style>
  </defs>

  <rect width="1600" height="1060" fill="url(#bg)"/>
  <path d="M0 90 C220 26 400 22 570 70 C752 122 920 126 1096 72 C1256 26 1418 18 1600 64 L1600 0 L0 0 Z" fill="url(#accentWave)" opacity=".85"/>
  <path d="M0 1008 C200 950 388 944 576 980 C772 1018 992 1010 1180 970 C1342 936 1460 934 1600 958 L1600 1060 L0 1060 Z" fill="#f6f7fb"/>

  <!-- Header -->
  <text x="80" y="74" class="nav">KCG soft</text>
  <text x="212" y="74" class="nav" opacity=".82">mobility technology partner</text>
  <text x="1150" y="74" class="nav">Core Services</text>
  <text x="1288" y="74" class="nav">Capability</text>
  <text x="1402" y="74" class="nav">Company</text>
  <text x="1494" y="74" class="nav">Contact</text>

  <!-- Head -->
  <text x="80" y="154" class="eyebrow">INDEX / CORE SERVICES</text>
  <text x="80" y="206" class="title">KCGsoft 핵심 서비스 라인업</text>
  <text x="80" y="240" class="body">Wonder Shuttle부터 Catchloc까지, 각각의 제품이 독립적으로 보이면서도 같은 운영 언어로 연결되는 소개 섹션 예시입니다.</text>

  <!-- Cards -->
  <g filter="url(#shadow)">
    <rect x="80" y="288" width="458" height="306" rx="18" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="570" y="288" width="458" height="306" rx="18" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="1060" y="288" width="458" height="306" rx="18" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="80" y="622" width="668" height="314" rx="18" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="780" y="622" width="738" height="314" rx="18" fill="#ffffff" stroke="#dfe4ec"/>
  </g>

  <!-- Shuttle -->
  <text x="110" y="326" class="cardTag" fill="#32b154">WONDER SHUTTLE</text>
  <text x="110" y="370" class="cardTitle">버스 통합 관제 서비스</text>
  <text x="110" y="400" class="cardText">실시간 위치, 노선 운영, 탑승 관리를</text>
  <text x="110" y="422" class="cardText">하나의 화면에서 확인하는 운영 솔루션.</text>
  <rect x="108" y="450" width="188" height="96" rx="14" fill="#eef9f1" stroke="#c9e6d4"/>
  <rect x="130" y="484" width="136" height="16" rx="8" fill="#32b154"/>
  <rect x="148" y="475" width="44" height="24" rx="5" fill="#ffffff" stroke="#32b154" stroke-width="2"/>
  <circle cx="150" cy="560" r="10" fill="#111111"/>
  <circle cx="260" cy="560" r="10" fill="#111111"/>
  <rect x="110" y="570" width="114" height="36" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="126" y="593" class="btn">자세히 보기</text>

  <!-- Linx -->
  <text x="600" y="326" class="cardTag" fill="#2380f1">WONDER LINX</text>
  <text x="600" y="370" class="cardTitle">지능형 버스 노선 설계</text>
  <text x="600" y="400" class="cardText">데이터를 기반한 노선 디자인과</text>
  <text x="600" y="422" class="cardText">최적 경로 계산을 돕는 설계 도구.</text>
  <rect x="602" y="452" width="178" height="92" rx="14" fill="#eef4ff" stroke="#c9d9ff"/>
  <path d="M598 524 C650 498, 694 496, 752 476" fill="none" stroke="#2380f1" stroke-width="3"/>
  <circle cx="608" cy="520" r="5" fill="#2380f1"/>
  <circle cx="668" cy="508" r="5" fill="#2380f1"/>
  <circle cx="730" cy="490" r="5" fill="#2380f1"/>
  <rect x="744" y="438" width="62" height="128" rx="12" fill="#ffffff" stroke="#2380f1" stroke-width="2"/>
  <circle cx="618" cy="560" r="10" fill="#111111"/>
  <circle cx="762" cy="560" r="10" fill="#111111"/>
  <rect x="600" y="570" width="114" height="36" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="616" y="593" class="btn">자세히 보기</text>

  <!-- Hydro -->
  <text x="1090" y="326" class="cardTag" fill="#1b3479">WONDER HYDRO</text>
  <text x="1090" y="370" class="cardTitle">수소 충전 통합 관리</text>
  <text x="1090" y="400" class="cardText">충전 상태, 이력, 운영 흐름을</text>
  <text x="1090" y="422" class="cardText">한 화면에서 관리하는 프로그램.</text>
  <rect x="1090" y="450" width="186" height="96" rx="14" fill="#eef2ff" stroke="#c9d5ff"/>
  <rect x="1118" y="442" width="34" height="112" rx="8" fill="#ffffff" stroke="#1b3479" stroke-width="2"/>
  <rect x="1162" y="426" width="60" height="128" rx="10" fill="#ffffff" stroke="#1b3479" stroke-width="2"/>
  <rect x="1232" y="444" width="38" height="110" rx="8" fill="#ffffff" stroke="#1b3479" stroke-width="2"/>
  <circle cx="1126" cy="562" r="10" fill="#111111"/>
  <circle cx="1248" cy="562" r="10" fill="#111111"/>
  <rect x="1090" y="570" width="114" height="36" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="1106" y="593" class="btn">자세히 보기</text>

  <!-- FMS -->
  <text x="110" y="660" class="cardTag" fill="#efbb45">WONDER FMS</text>
  <text x="110" y="706" class="cardTitle">전세버스 ERP 통합 관리</text>
  <text x="110" y="736" class="cardText">운영, 배차, 정산을 하나로 묶어</text>
  <text x="110" y="758" class="cardText">전세버스 업무를 정리하는 ERP 솔루션.</text>
  <text x="130" y="794" class="cardText">• ERP 통합 관리</text>
  <g transform="translate(422 690)">
    <rect x="0" y="22" width="168" height="68" rx="10" fill="#fff8de" stroke="#efbb45"/>
    <rect x="16" y="0" width="56" height="42" rx="8" fill="#ffffff" stroke="#efbb45" stroke-width="2"/>
    <rect x="86" y="0" width="56" height="42" rx="8" fill="#ffffff" stroke="#efbb45" stroke-width="2"/>
    <rect x="60" y="-8" width="50" height="90" rx="8" fill="#ffffff" stroke="#efbb45" stroke-width="2"/>
    <text x="84" y="40" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700" fill="#efbb45">ERP</text>
    <circle cx="24" cy="98" r="10" fill="#111111"/>
    <circle cx="136" cy="98" r="10" fill="#111111"/>
  </g>
  <rect x="110" y="818" width="114" height="36" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="126" y="841" class="btn">자세히 보기</text>

  <!-- Catchloc -->
  <text x="810" y="660" class="cardTag" fill="#e7437b">CATCHLOC</text>
  <text x="810" y="706" class="cardTitle">GPS 위치 추적 솔루션</text>
  <text x="810" y="736" class="cardText">차량과 자산의 위치를 실시간으로 확인하고</text>
  <text x="810" y="758" class="cardText">이동 이력과 상태를 함께 관리하는 구조.</text>
  <g transform="translate(1132 688)">
    <rect x="0" y="10" width="270" height="108" rx="16" fill="#ffeef5" stroke="#f2c2d2"/>
    <rect x="20" y="46" width="76" height="38" rx="8" fill="#ffffff" stroke="#e7437b" stroke-width="2"/>
    <rect x="112" y="28" width="60" height="56" rx="8" fill="#ffffff" stroke="#e7437b" stroke-width="2"/>
    <rect x="184" y="42" width="64" height="42" rx="8" fill="#ffffff" stroke="#e7437b" stroke-width="2"/>
    <path d="M136 30c10 0 18 8 18 18 0 16-18 34-18 34s-18-18-18-34c0-10 8-18 18-18z" fill="#e7437b"/>
    <circle cx="136" cy="48" r="5" fill="#ffffff"/>
    <circle cx="56" cy="112" r="10" fill="#111111"/>
    <circle cx="208" cy="112" r="10" fill="#111111"/>
  </g>
  <rect x="810" y="818" width="114" height="36" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="826" y="841" class="btn">자세히 보기</text>
</svg>
