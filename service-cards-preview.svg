  <text x="956" y="348" class="cardSub">충전 운영과 상태를 한눈에 확인</text>
  <text x="956" y="370" class="cardSub">이력 관리와 운영 추적을 연결</text>
  <text x="956" y="392" class="cardSub">현장 판단을 빠르게 정리</text>
  <g transform="translate(1088 376)">
    <rect x="0" y="18" width="170" height="46" rx="12" fill="#eef2ff" stroke="#c7d5ff"/>
    <rect x="18" y="10" width="34" height="54" rx="8" fill="#ffffff" stroke="#1b3479" stroke-width="2"/>
    <rect x="64" y="0" width="58" height="64" rx="10" fill="#ffffff" stroke="#1b3479" stroke-width="2"/>
    <rect x="130" y="18" width="34" height="46" rx="8" fill="#ffffff" stroke="#1b3479" stroke-width="2"/>
    <rect x="73" y="15" width="36" height="18" rx="4" fill="#1b3479" opacity=".9"/>
    <circle cx="24" cy="70" r="7" fill="#111111"/>
    <circle cx="144" cy="70" r="7" fill="#111111"/>
  </g>
  <rect x="956" y="444" width="104" height="34" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="972" y="466" class="btn">자세히 보기</text>

  <!-- Card 4 -->
  <text x="108" y="571" class="cardTag" fill="#efbb45">WONDER FMS</text>
  <text x="108" y="622" class="cardTitle">전세버스 ERP 통합 관리</text>
  <text x="108" y="652" class="cardSub">운영, 배차, 정산 흐름을 연결</text>
  <text x="108" y="674" class="cardSub">관리 데이터와 회계 흐름을 정리</text>
  <text x="108" y="696" class="cardSub">전세버스 업무를 하나로 묶음</text>
  <g transform="translate(364 606)">
    <rect x="0" y="30" width="150" height="50" rx="8" fill="#fff8de" stroke="#efbb45"/>
    <rect x="10" y="10" width="56" height="38" rx="8" fill="#ffffff" stroke="#efbb45" stroke-width="2"/>
    <rect x="86" y="4" width="54" height="44" rx="8" fill="#ffffff" stroke="#efbb45" stroke-width="2"/>
    <rect x="58" y="-4" width="48" height="70" rx="8" fill="#ffffff" stroke="#efbb45" stroke-width="2"/>
    <text x="68" y="36" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700" fill="#efbb45">ERP</text>
    <circle cx="20" cy="84" r="7" fill="#111111"/>
    <circle cx="122" cy="84" r="7" fill="#111111"/>
  </g>
  <rect x="108" y="740" width="104" height="34" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="124" y="762" class="btn">자세히 보기</text>

  <!-- Card 5 -->
  <text x="772" y="571" class="cardTag" fill="#e7437b">CATCHLOC</text>
  <text x="772" y="622" class="cardTitle">GPS 위치 추적 솔루션</text>
  <text x="772" y="652" class="cardSub">차량과 자산의 위치를 실시간 확인</text>
  <text x="772" y="674" class="cardSub">이동 이력과 상태 기록을 관리</text>
  <text x="772" y="696" class="cardSub">현장 대응을 더 빠르게 정리</text>
  <g transform="translate(1010 606)">
    <rect x="0" y="8" width="188" height="72" rx="14" fill="#ffeef5" stroke="#f4bfd1"/>
    <rect x="12" y="30" width="60" height="30" rx="8" fill="#ffffff" stroke="#e7437b" stroke-width="2"/>
    <rect x="82" y="20" width="42" height="40" rx="8" fill="#ffffff" stroke="#e7437b" stroke-width="2"/>
    <rect x="132" y="28" width="42" height="32" rx="8" fill="#ffffff" stroke="#e7437b" stroke-width="2"/>
    <circle cx="38" cy="70" r="7" fill="#111111"/>
    <circle cx="148" cy="70" r="7" fill="#111111"/>
    <circle cx="108" cy="38" r="10" fill="#e7437b" opacity=".16"/>
    <path d="M108 24c7 0 12 5 12 12 0 10-12 22-12 22s-12-12-12-22c0-7 5-12 12-12z" fill="#e7437b"/>
    <circle cx="108" cy="36" r="4" fill="#ffffff"/>
