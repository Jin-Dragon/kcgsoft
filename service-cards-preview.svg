  <text x="532" y="348" class="cardSub">데이터를 기반한 노선 디자인</text>
  <text x="532" y="370" class="cardSub">최적 경로와 예상 운행시간 계산</text>
  <text x="532" y="392" class="cardSub">계획 변경에 빠르게 대응</text>
  <g transform="translate(682 386)">
    <path d="M0 36 C44 18, 80 18, 126 10" fill="none" stroke="#2380f1" stroke-width="3"/>
    <circle cx="6" cy="34" r="5" fill="#2380f1"/>
    <circle cx="54" cy="26" r="5" fill="#2380f1"/>
    <circle cx="100" cy="18" r="5" fill="#2380f1"/>
    <rect x="82" y="0" width="74" height="40" rx="8" fill="#ffffff" stroke="#bfd9ff"/>
    <rect x="110" y="-12" width="42" height="78" rx="10" transform="rotate(10 110 -12)" fill="#ffffff" stroke="#2380f1" stroke-width="3"/>
    <circle cx="10" cy="47" r="8" fill="#111111"/>
    <circle cx="108" cy="47" r="8" fill="#111111"/>
  </g>
  <rect x="532" y="444" width="104" height="34" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="548" y="466" class="btn">자세히 보기</text>

  <!-- Card 3 -->
  <text x="956" y="269" class="cardTag" fill="#1b3479">WONDER HYDRO</text>
