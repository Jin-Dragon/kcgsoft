<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 980" role="img" aria-label="PC용 제품 소개 카드 섹션 예시">
  <defs>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="heroWave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8f4ec" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#dceeff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fcecf3" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 40px "Space Grotesk", "Noto Sans KR", sans-serif; fill: #111111; }
      .subtitle { font: 400 18px "Noto Sans KR", sans-serif; fill: #3e202a; }
      .eyebrow { font: 700 12px "Space Grotesk", sans-serif; letter-spacing: .14em; fill: #7a8088; }
      .cardTag { font: 700 12px "Space Grotesk", sans-serif; letter-spacing: .12em; }
      .cardTitle { font: 700 29px "Noto Sans KR", sans-serif; fill: #111111; }
      .cardSub { font: 400 15px "Noto Sans KR", sans-serif; fill: #3e202a; }
      .btn { font: 700 14px "Noto Sans KR", sans-serif; fill: #111111; }
      .small { font: 400 12px "Noto Sans KR", sans-serif; fill: #5c6270; }
    </style>
  </defs>

  <rect width="1400" height="980" fill="url(#bgGlow)"/>
  <path d="M0,92 C180,18 368,18 520,80 C696,151 846,146 1022,74 C1160,16 1280,10 1400,58 L1400,0 L0,0 Z" fill="url(#heroWave)"/>
  <path d="M0,936 C180,870 358,878 534,920 C702,958 870,954 1032,912 C1168,875 1280,868 1400,900 L1400,980 L0,980 Z" fill="#f6f7fb"/>

  <text x="80" y="84" class="eyebrow">INDEX / CORE SERVICES</text>
  <text x="80" y="140" class="title">KCGsoft 핵심 서비스 라인업</text>
  <text x="80" y="176" class="subtitle">운영 흐름과 현장 데이터를 하나의 시스템 안에서 읽히도록 정리한 카드형 소개 섹션입니다.</text>

  <g filter="url(#softShadow)">
    <rect x="80" y="230" width="392" height="268" rx="18" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="504" y="230" width="392" height="268" rx="18" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="928" y="230" width="392" height="268" rx="18" fill="#ffffff" stroke="#dfe4ec"/>

    <rect x="80" y="530" width="580" height="272" rx="18" fill="#ffffff" stroke="#dfe4ec"/>
    <rect x="744" y="530" width="576" height="272" rx="18" fill="#ffffff" stroke="#dfe4ec"/>
  </g>

  <!-- Card 1 -->
  <text x="108" y="269" class="cardTag" fill="#32b154">WONDER SHUTTLE</text>
  <text x="108" y="318" class="cardTitle">버스 통합 관제 서비스</text>
  <text x="108" y="348" class="cardSub">실시간 위치 확인</text>
  <text x="108" y="370" class="cardSub">노선 관리와 탑승 관리</text>
  <text x="108" y="392" class="cardSub">배차·통계까지 연결</text>
  <g transform="translate(196 400)">
    <rect x="0" y="0" width="166" height="54" rx="10" fill="#e9f8ee" stroke="#bde6c9"/>
    <rect x="34" y="18" width="98" height="18" rx="9" fill="#32b154"/>
    <rect x="48" y="9" width="38" height="20" rx="4" fill="#ffffff" opacity=".86"/>
    <circle cx="50" cy="46" r="8" fill="#111111"/>
    <circle cx="120" cy="46" r="8" fill="#111111"/>
    <circle cx="50" cy="46" r="3.2" fill="#ffffff"/>
    <circle cx="120" cy="46" r="3.2" fill="#ffffff"/>
  </g>
  <rect x="108" y="444" width="104" height="34" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="124" y="466" class="btn">자세히 보기</text>

  <!-- Card 2 -->
