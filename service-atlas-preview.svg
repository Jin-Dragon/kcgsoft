<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1040" role="img" aria-label="KCGsoft 간결한 서비스 소개 UI 예시">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbfcfe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <style>
      .nav { font: 500 14px "Space Grotesk", sans-serif; fill: #111111; }
      .eyebrow { font: 700 11px "Space Grotesk", sans-serif; letter-spacing: .14em; fill: #7b8189; }
      .title { font: 700 46px "Space Grotesk", "Noto Sans KR", sans-serif; fill: #111111; }
      .body { font: 400 16px "Noto Sans KR", sans-serif; fill: #3e202a; }
      .rowNum { font: 700 12px "Space Grotesk", sans-serif; letter-spacing: .12em; }
      .rowName { font: 700 16px "Space Grotesk", sans-serif; fill: #111111; }
      .rowDesc { font: 400 13px "Noto Sans KR", sans-serif; fill: #5a6170; }
      .panelTag { font: 700 12px "Space Grotesk", sans-serif; letter-spacing: .12em; }
      .panelTitle { font: 700 30px "Noto Sans KR", sans-serif; fill: #111111; }
      .panelText { font: 400 15px "Noto Sans KR", sans-serif; fill: #3e202a; }
      .btn { font: 700 13px "Noto Sans KR", sans-serif; fill: #111111; }
      .small { font: 400 12px "Noto Sans KR", sans-serif; fill: #5a6170; }
    </style>
  </defs>

  <rect width="1600" height="1040" fill="url(#bg)"/>
  <path d="M0 92 C220 26 388 24 572 72 C746 116 898 122 1078 72 C1240 28 1412 20 1600 66 L1600 0 L0 0 Z" fill="#eef3f8"/>
  <path d="M0 1002 C212 946 398 942 582 980 C780 1018 974 1012 1162 972 C1334 936 1460 934 1600 958 L1600 1040 L0 1040 Z" fill="#f6f7fb"/>

  <!-- Header -->
  <text x="80" y="76" class="nav">KCG soft</text>
  <text x="210" y="76" class="nav" opacity=".82">mobility technology partner</text>
  <text x="1150" y="76" class="nav">Core Services</text>
  <text x="1288" y="76" class="nav">Capability</text>
  <text x="1402" y="76" class="nav">Company</text>
  <text x="1494" y="76" class="nav">Contact</text>

  <!-- Headline -->
  <text x="80" y="154" class="eyebrow">SERVICE ATLAS</text>
  <text x="80" y="208" class="title">핵심 서비스 라인업</text>
  <text x="80" y="242" class="body">이동, 추적, 운영, 정산을 별개의 카드가 아니라 하나의 제품 언어로 읽게 만드는 간결한 소개 UI입니다.</text>

  <!-- Main frame -->
  <g filter="url(#shadow)">
    <rect x="80" y="292" width="1440" height="648" rx="0" fill="#ffffff" stroke="#e2e7ef"/>
  </g>

  <!-- Left list rail -->
  <rect x="80" y="292" width="446" height="648" fill="#ffffff" stroke="#e2e7ef"/>
  <line x1="80" y1="372" x2="526" y2="372" stroke="#e2e7ef"/>
  <line x1="80" y1="452" x2="526" y2="452" stroke="#e2e7ef"/>
  <line x1="80" y1="532" x2="526" y2="532" stroke="#e2e7ef"/>
  <line x1="80" y1="612" x2="526" y2="612" stroke="#e2e7ef"/>
  <line x1="80" y1="692" x2="526" y2="692" stroke="#e2e7ef"/>

  <rect x="80" y="292" width="6" height="648" fill="#111111"/>
  <rect x="80" y="292" width="6" height="80" fill="#2380f1"/>
  <rect x="80" y="452" width="6" height="80" fill="#32b154"/>
  <rect x="80" y="532" width="6" height="80" fill="#1b3479"/>
  <rect x="80" y="612" width="6" height="80" fill="#efbb45"/>
  <rect x="80" y="692" width="6" height="80" fill="#e7437b"/>

  <text x="110" y="338" class="rowNum" fill="#2380f1">01</text>
  <text x="146" y="338" class="rowName">Wonder Linx</text>
  <text x="146" y="360" class="rowDesc">지능형 노선 설계</text>

  <text x="110" y="418" class="rowNum" fill="#32b154">02</text>
  <text x="146" y="418" class="rowName">Wonder Shuttle</text>
  <text x="146" y="440" class="rowDesc">GPS 위치 추적 · 탑승자 데이터</text>

  <text x="110" y="498" class="rowNum" fill="#1b3479">03</text>
  <text x="146" y="498" class="rowName">Data Efficiency</text>
  <text x="146" y="520" class="rowDesc">노선 증감차 · 정류장 효율화</text>

  <text x="110" y="578" class="rowNum" fill="#efbb45">04</text>
  <text x="146" y="578" class="rowName">Wonder FMS</text>
  <text x="146" y="600" class="rowDesc">관리 ERP 데이터화</text>

  <text x="110" y="658" class="rowNum" fill="#e7437b">05</text>
  <text x="146" y="658" class="rowName">Catchloc</text>
  <text x="146" y="680" class="rowDesc">GPS 추적 · 이력 관리</text>

  <text x="110" y="756" class="small">좌측은 순서가 보이는 리스트,</text>
  <text x="110" y="776" class="small">우측은 선택된 제품의 상세 프리뷰입니다.</text>

  <!-- Right preview panel -->
  <rect x="558" y="292" width="962" height="648" fill="#ffffff"/>
  <rect x="558" y="292" width="962" height="70" fill="#ffffff" stroke="#e2e7ef"/>
  <text x="592" y="336" class="panelTag" fill="#32b154">SELECTED PRODUCT</text>

  <text x="592" y="396" class="panelTitle">Wonder Shuttle</text>
  <text x="592" y="426" class="panelText">버스 운행과 탑승 데이터를 실시간으로 읽고, 운영팀이 바로 판단할 수 있게 정리하는 통합 관제 솔루션.</text>

  <!-- Preview visual -->
  <g filter="url(#shadow)">
    <rect x="592" y="466" width="892" height="340" rx="0" fill="#ffffff" stroke="#e2e7ef"/>
  </g>
  <rect x="624" y="494" width="820" height="18" fill="#32b154" opacity=".12"/>
  <rect x="624" y="528" width="300" height="92" fill="#f7fbf8" stroke="#d2e8d9"/>
  <rect x="956" y="528" width="488" height="92" fill="#fbfcff" stroke="#dbe4f0"/>
  <rect x="624" y="638" width="820" height="126" fill="#ffffff" stroke="#e2e7ef"/>

  <!-- Shuttle illustration in a restrained style -->
  <g transform="translate(668 548)">
    <rect x="0" y="24" width="182" height="52" rx="8" fill="#ffffff" stroke="#32b154" stroke-width="2"/>
    <rect x="18" y="10" width="52" height="34" rx="7" fill="#ffffff" stroke="#32b154" stroke-width="2"/>
    <rect x="78" y="10" width="52" height="34" rx="7" fill="#ffffff" stroke="#32b154" stroke-width="2"/>
    <rect x="138" y="18" width="28" height="26" rx="7" fill="#ffffff" stroke="#32b154" stroke-width="2"/>
    <circle cx="34" cy="82" r="10" fill="#111111"/>
    <circle cx="148" cy="82" r="10" fill="#111111"/>
    <circle cx="34" cy="82" r="4" fill="#ffffff"/>
    <circle cx="148" cy="82" r="4" fill="#ffffff"/>
  </g>
  <line x1="972" y1="574" x2="1346" y2="574" stroke="#dce3ec" stroke-width="2"/>
  <circle cx="1004" cy="574" r="8" fill="#32b154"/>
  <circle cx="1114" cy="574" r="8" fill="#2380f1"/>
  <circle cx="1224" cy="574" r="8" fill="#1b3479"/>
  <circle cx="1334" cy="574" r="8" fill="#efbb45"/>
  <text x="988" y="608" class="small">운행</text>
  <text x="1098" y="608" class="small">탑승</text>
  <text x="1208" y="608" class="small">배차</text>
  <text x="1318" y="608" class="small">통계</text>

  <rect x="972" y="648" width="470" height="78" fill="#ffffff" stroke="#e2e7ef"/>
  <rect x="992" y="668" width="116" height="10" fill="#32b154"/>
  <rect x="992" y="688" width="168" height="10" fill="#e9edf3"/>
  <rect x="992" y="706" width="220" height="10" fill="#e9edf3"/>
  <rect x="1240" y="666" width="170" height="48" rx="0" fill="#ffffff" stroke="#111111"/>
  <text x="1262" y="695" class="btn">자세히 보기</text>

  <!-- Bottom service strip -->
  <line x1="592" y1="828" x2="1456" y2="828" stroke="#e2e7ef"/>
  <text x="592" y="862" class="cardTag" fill="#2380f1">LINX</text>
  <text x="592" y="890" class="small">노선 설계</text>
  <text x="760" y="862" class="cardTag" fill="#32b154">SHUTTLE</text>
  <text x="760" y="890" class="small">운행 관제</text>
  <text x="940" y="862" class="cardTag" fill="#1b3479">HYDRO</text>
  <text x="940" y="890" class="small">충전 관리</text>
  <text x="1118" y="862" class="cardTag" fill="#efbb45">FMS</text>
  <text x="1118" y="890" class="small">ERP 운영</text>
  <text x="1288" y="862" class="cardTag" fill="#e7437b">CATCHLOC</text>
  <text x="1288" y="890" class="small">위치 추적</text>
</svg>
